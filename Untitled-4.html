                    { q: "Eskirish summasi yillik stavka o'rniga faqat bir marta chegirildi. Aktiv qiymati tez orada nolga tushdi. Quyidagi fikrlarning qaysi biri to'g'ri emas?", type: "theory", answer: "Amortizatsiya faqat bir marta hisoblanadi.", options: ["Amortizatsiya faqat bir marta hisoblanadi.", "Amortizatsiya har oyda muntazam hisoblanadi.", "Amortizatsiya foydalanish muddatiga mutanosib taqsimlanadi.", "Amortizatsiya mahsulot tannarxiga asta qo'shiladi."] },
                    // Provodka (3)
                    { q: "Yetkazib beruvchidan asosiy vosita kirim qilindi. Qaysi o'tkazma to'g'ri?", type: "provodka", answer: "Debet 0820 — Kredit 6010 qilingan.", options: ["Debet 0820 — Kredit 6010 qilingan.", "Debet 0110 — Kredit 6010 qilingan.", "Debet 6010 — Kredit 0820 qilingan.", "Debet 0110 — Kredit 5110 qilingan."] },
                    { q: "Ma'muriyat binosi uchun amortizatsiya hisoblandi. Qaysi o'tkazma to'g'ri?", type: "provodka", answer: "Debet 9420 — Kredit 0220 qilingan.", options: ["Debet 9420 — Kredit 0220 qilingan.", "Debet 2010 — Kredit 0220 qilingan.", "Debet 0220 — Kredit 9420 qilingan.", "Debet 9430 — Kredit 0220 qilingan."] },
                    { q: "Asosiy vosita foydalanishga topshirildi. Qaysi o'tkazma to'g'ri?", type: "provodka", answer: "Debet 0120 — Kredit 0820 qilingan.", options: ["Debet 0120 — Kredit 0820 qilingan.", "Debet 0820 — Kredit 0120 qilingan.", "Debet 0120 — Kredit 6010 qilingan.", "Debet 1010 — Kredit 0820 qilingan."] },
                    // Math (3)
                    { q: "Uskuna 120 mln. Foydalanish muddati 10 yil. Yillik eskirish?", type: "math", answer: "O'n ikki million so'm hisoblangan.", options: ["O'n ikki million so'm hisoblangan.", "Yigirma million so'm hisoblangan miqdor.", "Bir butun ikki million so'm.", "O'n million so'm hisoblangan miqdor."] },
                    { q: "Boshlang'ich qiymat 50 mln. Yig'ilgan eskirish 20 mln. Qoldiq qiymat?", type: "math", answer: "O'ttiz million so'm bo'lgan.", options: ["O'ttiz million so'm bo'lgan.", "Yetti million so'm bo'lgan.", "Qirq million so'm hisoblangan miqdor.", "Yigirma million so'm hisoblangan miqdor."] },
                    { q: "Yillik eskirish 12 mln. Oylik eskirish summasi qancha bo'ladi?", type: "math", answer: "Bir million so'm hisoblangan miqdor.", options: ["Bir million so'm hisoblangan miqdor.", "O'n ikki million so'm hisoblangan.", "O'n million so'm hisoblangan miqdor.", "Ikki million so'm hisoblangan miqdor."] }
                ]
            }
        ];

        // --- HELPER FUNCTION ---
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // --- COMPONENTS ---

        function App() {
            const [screen, setScreen] = useState('home'); // home, topics, quiz, results
            const [selectedTopicId, setSelectedTopicId] = useState(null);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [score, setScore] = useState(0);
            
            // For Quiz State
            const [shuffledOptions, setShuffledOptions] = useState([]);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isChecking, setIsChecking] = useState(false);

            const activeTopic = useMemo(() => 
                quizData.find(t => t.id === selectedTopicId), [selectedTopicId]
            );

            // Prepare question when index changes
            useEffect(() => {
                if (screen === 'quiz' && activeTopic) {
                    const currentQuestion = activeTopic.questions[currentQIndex];
                    setShuffledOptions(shuffleArray(currentQuestion.options));
                    setSelectedAnswer(null);
                    setIsChecking(false);
                }
            }, [currentQIndex, screen, activeTopic]);

            const startQuiz = (topicId) => {
                setSelectedTopicId(topicId);
                setCurrentQIndex(0);
                setScore(0);
                setScreen('quiz');
            };

            const handleAnswer = (option) => {
                if (isChecking) return;
                setSelectedAnswer(option);
                setIsChecking(true);

                const currentQuestion = activeTopic.questions[currentQIndex];
                if (option === currentQuestion.answer) {
                    setScore(prev => prev + 1);
                }

                setTimeout(() => {
                    if (currentQIndex < activeTopic.questions.length - 1) {
                        setCurrentQIndex(prev => prev + 1);
                    } else {
                        setScreen('results');
                    }
                }, 1500); // Wait 1.5s to show correct/incorrect colors
            };

            const resetApp = () => {
                setScreen('topics');
                setSelectedTopicId(null);
                setCurrentQIndex(0);
                setScore(0);
            };

            // --- SCREENS ---

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[80vh] text-center px-4 fade-in">
                    <div className="bg-white p-8 rounded-2xl shadow-xl max-w-lg w-full border-t-4 border-brand-DEFAULT">
                        <h1 className="text-3xl font-bold text-brand-dark mb-2">FAXR MADAD KONSALT</h1>
                        <p className="text-gray-500 mb-8 uppercase tracking-widest text-sm font-semibold">O'quv Markazi</p>
                        
                        <div className="w-24 h-24 bg-brand-light/10 rounded-full flex items-center justify-center mx-auto mb-6 text-brand-DEFAULT">
                            <Icons.BookOpen />
                        </div>

                        <h2 className="text-2xl font-bold text-slate-800 mb-4">Buxgalteriya Simulyatori</h2>
                        <p className="text-slate-600 mb-8">
                            Amaliy buxgalteriya yozuvlari, soliq hisob-kitoblari va nazariy bilimlaringizni sinab ko'ring.
                        </p>
                        <button 
                            onClick={() => setScreen('topics')}
                            className="w-full bg-brand-DEFAULT hover:bg-brand-dark text-white font-bold py-4 px-8 rounded-xl transition-colors shadow-lg hover:shadow-xl"
                        >
                            Bilimni sinashni boshlash
                        </button>
                    </div>
                </div>
            );

            const renderTopics = () => (
                <div className="max-w-4xl mx-auto py-12 px-4 fade-in">
                    <div className="text-center mb-10">
                        <h2 className="text-sm font-bold text-brand-DEFAULT uppercase tracking-wider mb-2">FAXR MADAD KONSALT</h2>
                        <h1 className="text-3xl font-bold text-slate-800">Mavzuni tanlang</h1>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {quizData.map((topic) => {
                            const IconComp = Icons[topic.icon];
                            return (
                                <button 
                                    key={topic.id}
                                    onClick={() => startQuiz(topic.id)}
                                    className="bg-white p-6 rounded-2xl shadow-md hover:shadow-xl transition-all border border-slate-100 hover:border-brand-light flex flex-col items-center text-center group"
                                >
                                    <div className="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center text-brand-DEFAULT mb-4 group-hover:bg-brand-DEFAULT group-hover:text-white transition-colors">
                                        <IconComp />
                                    </div>
                                    <h3 className="font-bold text-slate-800 text-lg mb-2">{topic.title}</h3>
                                    <p className="text-slate-500 text-sm">10 ta amaliy savol</p>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );

            const renderQuiz = () => {
                if (!activeTopic) return null;
                const currentQuestion = activeTopic.questions[currentQIndex];
                const progress = ((currentQIndex) / activeTopic.questions.length) * 100;

                // Determine question type label
                let typeLabel = "";
                let typeColor = "";
                if(currentQuestion.type === "theory") { typeLabel = "Nazariya"; typeColor = "bg-blue-100 text-blue-700"; }
                if(currentQuestion.type === "provodka") { typeLabel = "O'tkazma"; typeColor = "bg-purple-100 text-purple-700"; }
                if(currentQuestion.type === "math") { typeLabel = "Hisob-kitob"; typeColor = "bg-orange-100 text-orange-700"; }

                return (
                    <div className="max-w-2xl mx-auto py-8 px-4 fade-in">
                        {/* Header */}
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="font-bold text-slate-600 text-sm">{activeTopic.title}</h2>
                            <span className="font-bold text-brand-DEFAULT bg-brand-light/10 py-1 px-3 rounded-full text-sm">
                                {currentQIndex + 1} / {activeTopic.questions.length}
                            </span>
                        </div>

                        {/* Progress Bar */}
                        <div className="w-full bg-slate-200 h-2 rounded-full mb-8 overflow-hidden">
                            <div className="bg-brand-DEFAULT h-2 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                        </div>

                        {/* Question Card */}
                        <div className="bg-white rounded-2xl shadow-lg p-6 md:p-8 mb-6 border border-slate-100">
                            <div className="flex justify-between items-start mb-4">
                                <span className={`text-xs font-bold uppercase tracking-wider py-1 px-2 rounded ${typeColor}`}>
                                    {typeLabel}
                                </span>
                            </div>
                            <h3 className="text-xl md:text-2xl font-semibold text-slate-800 leading-snug">
                                {currentQuestion.q}
                            </h3>
                        </div>

                        {/* Options */}
                        <div className="space-y-3">
                            {shuffledOptions.map((option, index) => {
                                let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all font-medium text-slate-700 option-btn ";
                                
                                if (!isChecking) {
                                    btnClass += "border-slate-200 hover:border-brand-DEFAULT hover:bg-slate-50 bg-white";
                                } else {
                                    // Checking state logic
                                    if (option === currentQuestion.answer) {
                                        btnClass += "border-green-500 bg-green-50 text-green-800"; // Correct answer always turns green
                                    } else if (option === selectedAnswer && option !== currentQuestion.answer) {
                                        btnClass += "border-red-500 bg-red-50 text-red-800"; // Selected wrong answer turns red
                                    } else {
                                        btnClass += "border-slate-200 bg-white opacity-50"; // Others fade
                                    }
                                }

                                const letters = ['A', 'B', 'C', 'D'];

                                return (
                                    <button 
                                        key={index}
                                        disabled={isChecking}
                                        onClick={() => handleAnswer(option)}
                                        className={btnClass}
                                    >
                                        <div className="flex items-center">
                                            <span className="flex-shrink-0 w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center mr-4 text-sm font-bold text-slate-500">
                                                {letters[index]}
                                            </span>
                                            <span>{option}</span>
                                        </div>
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderResults = () => {
                const total = activeTopic.questions.length;
                const percentage = Math.round((score / total) * 100);
                
                let message = "";
                let IconRes = Icons.CheckCircle;
                let colorClass = "text-green-500";
                
                if (percentage >= 80) {
                    message = "Ajoyib natija! Siz buxgalteriya sir-asrorlarini yaxshi o'zlashtirgansiz.";
                } else if (percentage >= 50) {
                    message = "Yaxshi! Lekin bilimingizni yana biroz mustahkamlashingiz kerak.";
                    IconRes = Icons.TrendingUp;
                    colorClass = "text-orange-500";
                } else {
                    message = "Qayta urinib ko'ring. Xatolardan o'rganish — eng yaxshi tajribadir.";
                    IconRes = Icons.XCircle;
                    colorClass = "text-red-500";
                }

                return (
                    <div className="flex flex-col items-center justify-center min-h-[80vh] px-4 fade-in">
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-100">
                            <h2 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Natija</h2>
                            
                            <div className={`w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 bg-slate-50 ${colorClass}`}>
                                <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>

                            <h3 className="text-4xl font-bold text-slate-800 mb-2">{score} / {total}</h3>
                            <p className="text-lg font-semibold text-slate-600 mb-4">{percentage}% To'g'ri javob</p>
                            
                            <p className="text-slate-500 mb-8">{message}</p>

                            <button 
                                onClick={resetApp}
                                className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-8 rounded-xl transition-colors shadow-lg"
                            >
                                Boshqa mavzuni tanlash
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
                    {/* Simple Header */}
                    <header className="bg-white shadow-sm py-4 px-6 flex justify-between items-center border-b border-slate-200">
                        <div className="flex items-center space-x-2 text-brand-DEFAULT font-bold text-lg tracking-tight cursor-pointer" onClick={() => setScreen('home')}>
                            <Icons.BookOpen />
                            <span>FAXR MADAD KONSALT</span>
                        </div>
                        {screen !== 'home' && (
                            <button onClick={() => setScreen('home')} className="text-sm text-slate-500 hover:text-brand-DEFAULT font-medium transition-colors">
                                Bosh sahifa
                            </button>
                        )}
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-grow">
                        {screen === 'home' && renderHome()}
                        {screen === 'topics' && renderTopics()}
                        {screen === 'quiz' && renderQuiz()}
                        {screen === 'results' && renderResults()}
                    </main>
                    
                    {/* Footer */}
                    <footer className="py-6 text-center text-slate-400 text-sm">
                        © {new Date().getFullYear()} FAXR MADAD KONSALT. Buxgalteriya Simulyatori.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
